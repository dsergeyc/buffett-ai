name: Daily Buffett Report

on:
  schedule:
    # 9 AM ET on weekdays (2 PM UTC — accounts for ET offset)
    - cron: '0 14 * * 1-5'
  workflow_dispatch:  # lets you trigger it manually from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yfinance

      - name: Generate dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "Buffett AI Bot"
          git config user.email "buffett-ai@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (
            git commit -m "Daily dashboard: $(date +%Y-%m-%d)" &&
            git push
          )
